<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panadería Dulce Herencia</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="assets/logoB.svg">
</head>
<body>
    <div class="app-container">
        <!-- Encabezado -->
        <header class="header">
            <div class="logo">
                <img src="assets/logoB.svg" alt="Dulce Herencia" class="logo-img" onerror="this.style.display='none'">
                <!--<h1>CONTROL DE VENTAS</h1>-->
            </div>
            <!--<div class="user-info">
                <span>Bienvenido, Admin</span>
            </div>-->
        </header>

        <!-- Menú principal -->
        <nav class="main-menu">
            <button class="menu-btn active" data-module="inicio">
                <span class="icon">🏠</span>
                <span>Inicio</span>
            </button>
            <button class="menu-btn" data-module="punto-venta">
                <span class="icon">🛒</span>
                <span>Punto de Venta</span>
            </button>
            <button class="menu-btn" data-module="historial-ventas">
                <span class="icon">📋</span>
                <span>Historial Ventas</span>
            </button>
            <button class="menu-btn" data-module="instrumentos">
                <span class="icon">🛠️</span>
                <span>Instrumentos</span>
            </button>
            <button class="menu-btn" data-module="empleados">
                <span class="icon">👥</span>
                <span>Empleados</span>
            </button>
            <button class="menu-btn" data-module="productos">
                <span class="icon">🥐</span>
                <span>Productos</span>
            </button>
            <button class="menu-btn" data-module="ganancias">
                <span class="icon">📊</span>
                <span>Ganancias</span>
            </button>
            <button class="menu-btn" data-module="materia-prima">
                <span class="icon">📦</span>
                <span>Materia Prima</span>
            </button>
            <button class="menu-btn" data-module="graficas">
                <span class="icon">📈</span>
                <span>Gráficas</span>
            </button>
            <button class="menu-btn" data-module="salir" id="btn-salir">
                <span class="icon">🚪</span>
                <span>Salir</span>
            </button>
        </nav>

        <!-- Contenido principal (cambiará según el módulo) -->
        <main id="contenido-principal" class="content">
            <!-- Módulo Inicio -->
            <div id="inicio" class="module active">
                <h2>Panel de Control</h2>
                <p>Bienvenido al sistema de gestión de tu panadería. Selecciona un módulo del menú para comenzar.</p>
                <div class="cards-container" id="inicio-resumen">
                    <!-- Se llenará con JavaScript -->
                </div>
            </div>
        </main>

        <!-- Pie de página -->
        <footer class="footer">
            <p>&copy; 2026 Panadería Dulce Herencia - Sistema de Gestión</p>
        </footer>
    </div>

    <!-- Script de Supabase (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // Exponer la función createClient globalmente
        window.supabaseCreateClient = supabase.createClient;
        console.log('📦 Biblioteca Supabase cargada');
    </script>

    <!-- PRIMERO: Script principal (funciones globales) -->
    <script src="script.js"></script>

    <!-- SEGUNDO: Cliente de Supabase -->
    <script src="modules/supabaseClient.js"></script>

    <!-- TERCERO: Módulos de sistema (base de datos y exportación) -->
    <script src="modules/database.js"></script>
    <script src="modules/exportador.js"></script>

    <!-- CUARTO: Módulos de negocio (ordenados por dependencia) -->
    <script src="modules/productos.js"></script>      <!-- Base para ventas -->
    <script src="modules/instrumentos.js"></script>
    <script src="modules/empleados.js"></script>
    <script src="modules/materia_prima.js"></script>
    <script src="modules/ventas.js"></script>    <!-- Depende de productos -->
    <script src="modules/punto_venta.js"></script>         <!-- Historial -->
    <script src="modules/ganancias.js"></script>      <!-- Depende de ventas -->
    <script src="modules/graficas.js"></script>       <!-- Depende de ventas -->

    <!-- Botón de reseteo seguro (al final para asegurar que el DOM cargó) -->
    <div style="position: fixed; bottom: 10px; right: 10px; opacity: 0.2; z-index: 9999;">
        <button id="resetSecreto" style="padding: 5px 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px;" title="Mantén Ctrl+Shift y haz clic para resetear">
            🔄 RESET (Seguro)
        </button>
    </div>

    <script>
        // Botón de reseteo seguro (requiere Ctrl+Shift+Click)
        document.addEventListener('DOMContentLoaded', function() {
            const resetBtn = document.getElementById('resetSecreto');
            if (resetBtn) {
                resetBtn.addEventListener('click', async function(e) {
                    if (e.ctrlKey && e.shiftKey) {
                        if (confirm('🔥 ¿RESETEAR COMPLETAMENTE TODOS LOS DATOS?\n\nSe borrarán TODOS los datos de Supabase.')) {
                            if (confirm('⚠️ ÚLTIMA OPORTUNIDAD: ¿Estás ABSOLUTAMENTE seguro?')) {
                                console.log('🔥 INICIANDO RESETEO TOTAL...');
                                
                                // Resetear Supabase
                                const client = window.supabaseClient?.getClient();
                                if (client) {
                                    try {
                                        await client.from('ventas').delete().neq('id', 0);
                                        await client.from('productos').delete().neq('id', 0);
                                        await client.from('instrumentos').delete().neq('id', 0);
                                        await client.from('empleados').delete().neq('id', 0);
                                        await client.from('materia_prima').delete().neq('id', 0);
                                        await client.from('inversiones').delete().neq('id', 0);
                                        
                                        // Resetear metas a valores por defecto
                                        await client.from('metas').upsert({ 
                                            id: 1, 
                                            diaria: 100, 
                                            quincenal: 1500, 
                                            mensual: 2500 
                                        });
                                        
                                        alert('✅ TODOS LOS DATOS DE SUPABASE HAN SIDO ELIMINADOS\n\nLa página se recargará.');
                                        location.reload();
                                    } catch (err) {
                                        console.error('Error reseteando Supabase:', err);
                                        alert('⚠️ Error al resetear Supabase. Recargando...');
                                        location.reload();
                                    }
                                } else {
                                    alert('⚠️ Cliente Supabase no disponible. Recargando...');
                                    location.reload();
                                }
                            }
                        }
                    } else {
                        alert('🔒 Botón de seguridad: Mantén presionada la tecla Ctrl y Shift mientras haces clic');
                    }
                });
            }
        });
    </script>
</body>
</html>
